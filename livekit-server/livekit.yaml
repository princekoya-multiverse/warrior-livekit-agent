# ─────────────────────────────────────────────────────────────────────────
# LiveKit Server configuration — Warrior B.O.S.S. Phase 1
# Single-node SFU. Keys are injected via the LIVEKIT_KEYS env var in
# production (see docker-compose / Akash SDL) so secrets stay out of git.
# ─────────────────────────────────────────────────────────────────────────

port: 7880

rtc:
  # UDP media port range. Keep small for a cost-optimized single node.
  port_range_start: 50000
  port_range_end: 50200
  # TCP fallback for clients behind strict firewalls.
  tcp_port: 7881
  # On Akash the container must advertise its public IP for WebRTC to work.
  use_external_ip: true

# API keys: "apikey: secret". For local dev these are devkey/secret.
# In production, set the LIVEKIT_KEYS env var instead of hardcoding here.
keys:
  devkey: devsecret_change_me_0123456789abcdef

room:
  auto_create: true
  max_participants: 5        # Phase 1: small rooms
  empty_timeout: 300         # close empty rooms after 5 min

# Built-in TURN — ensures connectivity through corporate NATs without an
# external TURN server. Enable + provide TLS in production (see docs).
turn:
  enabled: false             # enabled in production via livekit.prod.yaml
  # domain: livekit.warriorworld.life
  # tls_port: 5349
  # udp_port: 3478

logging:
  level: info
  json: false
