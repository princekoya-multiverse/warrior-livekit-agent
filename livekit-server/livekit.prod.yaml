# ─────────────────────────────────────────────────────────────────────────
# LiveKit Server — PRODUCTION (Akash) configuration
# Keys are injected via the LIVEKIT_KEYS environment variable, NOT this file.
# Generate keys with ./generate-keys.sh
# ─────────────────────────────────────────────────────────────────────────

port: 7880

rtc:
  port_range_start: 50000
  port_range_end: 50200
  tcp_port: 7881
  use_external_ip: true

room:
  auto_create: true
  max_participants: 5
  empty_timeout: 300

# Built-in TURN for clients behind strict NAT/firewalls.
turn:
  enabled: true
  domain: livekit.warriorworld.life
  # TLS port requires a cert mounted into the container; 3478 UDP works without.
  tls_port: 5349
  udp_port: 3478

logging:
  level: info
  json: true
