# Nginx config for the frontend container.
# Serves the static SPA and reverse-proxies /api -> token server.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster loads.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Token server API. TOKEN_SERVER_HOST is substituted at container start
    # (see docker-compose env) or defaults to the compose service name.
    location /api/ {
        proxy_pass http://token-server:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
